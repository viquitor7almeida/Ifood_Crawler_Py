services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: fs-py
    hostname: flaresolverr
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - crawler-network

  ifood-crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crawler-py
    hostname: crawler
    restart: "no"
    depends_on:
      - flaresolverr
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      - CRAWLER_PARALLELISM=2
      - CRAWLER_MAX_RETRIES=5
      - CRAWLER_FLARESOLVERR_URL=http://flaresolverr:8191
      - CRAWLER_FLARESOLVERR_TIMEOUT=180
      - CRAWLER_INPUT_FILE=/app/data/ifood_urls_padrao_item_1000.csv
      - CRAWLER_OUTPUT_DIR=/app/output
      - CRAWLER_CHECKPOINT_DB_PATH=/app/checkpoints/checkpoint.db
      - CRAWLER_COOKIE_STORE_PATH=/app/cookies/cookies.json
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
      - ./cookies:/app/cookies
    networks:
      - crawler-network

networks:
  crawler-network:
    driver: bridge
